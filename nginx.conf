server {
    listen 80;
    server_name localhost; # Replace with your actual domain

    # The absolute path to the compiled Astro static files inside the Docker container
    root /usr/share/nginx/html;
    index index.html;

    # Enable Gzip compression for performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Routing rules
    location / {
        # Serve the requested file, if it doesn't exist try the directory, then fallback to 404
        try_files $uri $uri/ /404.html;
    }

    # Browser caching for static assets (fonts, images, CSS, JS)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff2|woff)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
